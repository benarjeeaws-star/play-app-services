name: 'my "first" workflow'
on: workflow_dispatch
jobs:
  my-first-job:
    runs-on: ubuntu-latest
    steps:
      - name: my first step
        run: |
          echo "Hello World" ${{github.event_name}}
          echo "This is my first workflow"
          echo "I am learning GitHub Actions"
  my-second-job:
    runs-on: ubuntu-latest
    needs: my-first-job
    steps:
      - name: Workflow name is ${{github.workflow}} and Job name is ${{github.job}}  event is ${{github.event}} action is ${{github.action}} action status is ${{github.action_status}}
        run: |
          echo "This is my second job"
          echo "It runs after the first job"
          echo "I am learning GitHub Actions"        